body:
  text: 隋天竺三藏闍那崛多等譯地獄品第四之三復次諸比丘彼阿毗至大地獄中亦有十六諸小地獄而為眷屬以自圍繞其獄各廣五百由旬初黑雲沙乃至最後寒氷地獄諸比丘如是地獄有何因緣名阿毗至耶諸比丘此阿毗至大地獄中所有衆生生者有者出者住者是諸衆生惡業果故自然出生諸守獄卒各以兩手執彼地獄諸衆生身撲置熾燃熱鐵地上火焰直上一向猛盛覆面於地便持利刀從腳踝上破出其筋手捉挽之乃至項筋皆相連引貫徹心髓痛苦難論如是挽已令駕鐵車馳奔而走其車甚熱光焰熾燃一向猛盛將其經歷無量由旬所行之處純是洞然熱鐵險道去已復去隨獄卒意無暫停時欲向何方稱意即去隨所去處隨所到處獄卒挽之未曾捨離如是去時隨所經歷銷鑠罪人身諸肉血無復遺餘以是因緣受嚴切苦極重劇苦意不喜苦命亦未終乃至未盡惡不善業未滅未散未變未移若於往昔人非人身所作來者一切悉受復次諸比丘此阿毗至大地獄中所有衆生生者有者化者住者以其不善業果報故從於東方有大火聚忽爾出生熾燃赤色極大猛焰一向炎赫如是次第南西北方四維上下各各皆有極大火聚熾燃出生光焰炎赫罪人爾時以此四方諸大火聚之所圍繞漸漸逼近觸其身故受諸痛苦乃至受於大嚴切苦命亦未終略説如上於彼獄中一切具受復次諸比丘此阿毗至大地獄中諸衆生等生者有者乃至住者惡業果故從於東壁出大光焰直射西壁到已而住從於西壁出大光焰直射東壁到已而住從於南壁出大光焰直射北壁從於北壁出大光焰直射南壁從下射上自上射下縱橫相接上下交射熱光赫奕騰焰相衝爾時獄卒以諸罪人擲置六種大火聚內是諸罪人乃至受於極嚴切苦命亦未終略説乃至彼不善業未畢未盡於其中間具足而受復次諸比丘此阿毗至大地獄中諸衆生等生者有者乃至住者惡業果故經無量時受長遠苦爾時即見地獄東門忽然自開是諸衆生既聞開聲復見門開便走趣之走已復走大速疾走各言我等至彼處已決應得脫我等今者若到彼處應大吉祥彼諸衆生如是走時走復走時速疾走時其身轉更熾燃光焰譬如世間有力壯夫將大火炬逆風而走而彼火炬更復轉燃焰熾猛盛如是如是彼諸衆生如是走時速疾走時身諸支節轉復熾燃舉足之時肉血離散下足之時肉血還生又彼衆生如是奔走欲近門時罪業力故門還自閉罪人爾時於彼獄中熾燃光焰熱鐵地上悶絶倒臥覆面而踣既覆倒已即燒其皮既燒皮已次燒其肉既燒肉已次燒其筋既燒筋已次燒其骨既燒骨已徹至其髓徹至髓時唯見煙出出已復出煙燧火出罪人於中乃至次第受極嚴苦命亦未終略説如前未盡彼人惡不善業乃至往昔人非人身所作來者於中具受復次諸比丘此阿毗至大地獄中諸衆生等生者有者乃至住者以諸不善業果報故經無量時長遠道中受諸苦已地獄四門還復更開於門開時彼地獄中諸衆生等聞聲見開向門而走走已復走乃至大走作如是念我等今者當於此處必應得脫我等於今定當訖了彼人如是大馳走時其身轉復熾燃猛烈譬如壯夫執乾草炬逆風而走彼炬既燃轉復熾盛如是如是彼諸衆生走已復走乃至大走如是走時彼人身分轉更熾燃欲舉足時肉血俱散欲下足時肉血還生及到獄門其門還閉彼諸衆生於此熾燃熱鐵地上一向馳走既不得出其心悶亂覆面倒地既倒地已遍燒身皮既燒皮已次燒其肉既燒肉已復燒其骨乃至徹髓煙焰洞燃其煙熢㶿其焰炎赫煙焰相雜熱惱復倍彼人於中受極嚴苦略説如前乃至壽命未得終盡惡不善業未滅未離未變未散乃至往昔人非人身所造作者一切悉受復次諸比丘此阿毗至大地獄中所有衆生乃至住者以不善業果報力故為地獄火熾燃燒之爾時眼所見色皆是意所不喜有意喜者皆不現前非意所好不可愛色不善之色而恆逼惱耳所聞聲鼻所聞香舌所知味身所覺觸意所念法皆是心意所不喜者非意所喜非可愛法恆來現前凡有境界皆是不善彼人於中以是因緣恆受極重粗澀苦惱其色惡故其觸亦然乃至壽命未得終盡惡不善業未沒未滅若於往昔人非人身有所造作一切惡業悉皆具受復次諸比丘有何因緣阿毗至獄名阿毗至耶諸比丘此阿毗至大地獄中於一切時無有須臾暫受安樂乃至得如一彈指頃是故名此大地獄者為阿毗至如是次第具足受苦諸比丘此大地獄諸衆生等經無量時受長遠苦乃至得從此阿毗至大地獄出出已馳走走已復走乃至大走欲求屋宅求覆求洲求歸依處求救護處爾時復入黑雲沙等五百由旬諸小地獄入已乃至略説最後到第十六寒氷地獄具受衆苦然後乃於彼處命終此中世尊説如是偈若人身口意造業作已入於惡道中如是當生活地獄最為可畏毛竪處經歷無數千億歲死已須臾還復活怨讎各各相報對由此衆生更相殺若於父母起惡心或佛菩薩聲聞衆此等皆墮黑繩獄其處受苦極嚴熾教他正行令邪曲見人友善必破壞此等亦墮黑繩獄兩舌惡口多妄語樂作三種惡重業不修三種善根芽此等癡人必當入合大地獄久受苦或殺羊馬及諸牛種種雜獸雞豬等并殺諸餘蟲蟻類彼人當墮合地獄世間怖畏相多種以此逼迫惱衆生當墮磑山地獄中受於塠壓舂搗苦貪欲恚癡結使故回轉正理令別異判是作非乖法律彼為刀劍輪所傷倚恃強勢劫奪他有力無力皆悉取若作如是諸逼惱當為鐵象所蹴踏若樂殺害諸衆生身手血塗心嚴惡常行如是不淨業彼等當生叫喚處種種觸惱衆生故於叫喚獄被燒煮其中復有大叫喚此由諂曲姧猾心諸見稠林所覆蔽愛網彌密所沈淪常行如是最下業彼則墮於大叫喚若至如是大叫喚熾燃鐵城毛竪處其中鐵堂及鐵屋諸來入者悉燒燃若作世間諸事業恆當惱亂諸衆生彼等當生熱惱獄於無量時受熱惱世間沙門婆羅門父母尊長諸耆舊若恆觸惱令不喜彼等皆墮熱惱獄生天淨業不樂修所愛至親常遠離喜作如是諸事者彼人當入熱惱獄惡向沙門婆羅門并諸善人父母等或復害於餘尊者彼墮熱惱常熾燃恆多造作諸惡業不曾發起一善心是人直趣阿毗獄當受無量衆苦惱若説正法為非法説諸非法為正法既無增益於善事彼人當入阿毗獄活及黑繩此兩獄合會叫喚等為五熱惱大熱共成七阿毗至獄為第八此八名為大地獄嚴熾苦切難忍受惡業之人所作故其中小獄有十六爾時世尊説此偈已告諸比丘作如是言汝諸比丘應當知彼世界中間別更復有十地獄處何等為十所謂頞浮陀地獄泥羅浮陀地獄阿呼地獄呼呼婆地獄阿吒吒地獄搔揵提迦地獄優鉢羅地獄波頭摩地獄奔茶梨地獄拘牟陀地獄諸比丘於彼中間有如是等十種地獄諸比丘何因何緣頞浮陀地獄名頞浮陀耶諸比丘頞浮陀獄諸衆生等所有身形猶如泡沫是故名為頞浮陀也復次於中有何因緣泥羅浮陀地獄名泥羅浮陀耶諸比丘彼泥羅浮陀地獄中諸衆生等所有身形譬如肉段是故名為泥羅浮陀復次於中何因何緣阿呼地獄名為阿呼諸比丘阿呼地獄諸衆生等受嚴切苦逼迫之時叫喚而言阿呼阿呼甚大苦也是故名為阿呼地獄復次於中何因何緣呼呼婆獄名呼呼婆耶諸比丘彼呼呼婆地獄中諸衆生等為彼地獄極苦逼時叫喚而言呼呼婆呼呼婆是故名為呼呼婆也復次於中何因何緣阿吒吒獄名阿吒吒耶諸比丘彼阿吒吒地獄中諸衆生等以極苦惱逼切其身但得唱言阿吒吒阿吒吒然其舌聲不能出口是故名為阿吒吒也復次於中何因何緣搔揵提迦名搔揵提迦耶諸比丘搔揵提迦地獄之中猛火焰色如搔揵提迦花是故名為搔揵提迦復次於中何因何緣優鉢羅獄名優鉢羅耶諸比丘彼優鉢羅地獄之中猛火焰色如優鉢羅華是故名為優鉢羅也復次於中何因何緣拘牟陀獄名拘牟陀耶諸比丘彼拘牟陀地獄之中猛火焰色如拘牟陀花是故名為拘牟陀也復次於中何因何緣奔茶梨迦獄名奔茶梨迦耶諸比丘奔茶梨迦地獄之中猛火焰色如奔茶梨迦花是故名為奔茶梨迦復次於中何因何緣波頭摩獄名波頭摩耶諸比丘彼波頭摩地獄之中猛火焰色如波頭摩花是故名為波頭摩也諸比丘如憍薩羅國斛量如是胡麻滿二十斛高盛不槩而於其間有一丈夫滿百年已取一胡麻如是次第滿百年已復取一粒擲置餘處諸比丘如是擲彼憍薩羅國滿二十斛胡麻盡已爾所時節頞浮陀獄我説其壽猶未畢盡且以此數略而計之如是二十頞浮陀壽為一泥羅浮陀壽二十泥羅浮陀壽為一阿呼壽二十阿呼壽為一呼呼婆壽二十呼呼婆壽為一阿吒吒壽二十阿吒吒壽為一搔揵提迦壽二十搔揵提迦壽為一優鉢羅壽二十優鉢羅壽為一拘牟陀壽二十拘牟陀壽為一奔茶梨迦壽二十奔茶梨迦壽為一波頭摩壽二十波頭摩壽為一中劫諸比丘波頭摩地獄所住之處若諸衆生離其處所一百由旬便為彼獄火焰所及若離五十由旬所住衆生為彼火熏皆盲無眼若離二十五由旬所住衆生身之肉血燋燃破散諸比丘瞿迦梨比丘為於舍利弗目揵連所起誹謗心濁心惡心故死後即生波頭摩獄生彼處已從其口中出大熱焰長餘十肘於其舌上自然而有五百鐵犁恆常耕之諸比丘我於餘處未曾見有如是色類自損害也所謂於梵行人邊生垢濁心故損惱心故毒惡心故不利益心故無慈心故無淨心故諸比丘是故汝等應於一切梵行人所起慈身口意業如我所見晝夜起慈身口意者常受安樂是故汝等一切比丘皆當如我所見所説應於晝夜常起慈心汝等常當如是習學爾時世尊説此伽他曰世間諸人在世時舌上自然生斤鈇所謂口説諸毒惡還自衰損害其身應讚歎者不稱譽不應讚者反談美如是名為口中諍以此諍故無樂受若人博戲得資財是為世間微諍事於淨行人起濁心是名口中大鬪諍如是三十六百千泥羅浮陀地獄數五頞浮陀諸地獄及墮波頭摩獄中以毀聖人致如是由口意業作惡故諸比丘世界中間復有諸風名曰熱惱諸比丘彼等諸風若來至此四洲界者此四洲界所有衆生生者住者一切身分悉皆散壞消滅無餘譬如葦荻若被刈已不得水灌皆當乾壞無有遺餘如是如是諸比丘世界中間所有諸風名熱惱者若來至此四洲界時此四洲界所有衆生一時皆悉乾壞無餘亦復如是但以內鐵圍山大鐵圍山二山所障是故彼風不來到此諸比丘彼鐵圍山大鐵圍山能作如是最大利益為此四洲四世界中諸衆生等作依止業復次諸比丘世界中間所有諸風吹彼地獄燒煮衆生身肉脂髓種種不淨臭穢之氣甚可畏惡諸比丘其風若來至此四洲世界中者四洲世界所有衆生乃至住者一切盲冥無復眼目以其臭氣極猛盛故然由鐵圍及大鐵圍二山為障遮礙彼故不來至此諸比丘彼內鐵圍及大鐵圍二種大山乃能為此四洲世界諸衆生等作如是比最大利益成諸衆生依止業故復次諸比丘世界中間更有大風名僧伽多諸比丘彼風若來至此世界則此世界四種大洲及八萬四千諸餘小洲并餘大山須彌山王悉能吹舉去地或高一俱盧奢舉已能令分散破壞乃至二三四五六七俱盧奢既擎舉已悉能令其星散破壞乃至擎舉高一由旬星散破壞亦如前説如是二三四五六七由旬擎舉破壞悉令分散乃至一百由旬既擎舉已分散破壞二三四五六七百由旬既擎舉已分散破壞亦復如前乃至一千由旬二三四五六七千由旬擎舉之已分散破壞諸比丘譬如壯夫手把麥䴬把已高舉末令粉碎於虛空中分散棄擲令無遺餘如是如是諸比丘彼世界中間最大猛風名僧伽多其風若來至此四洲爾時此界四種大洲及八萬四千諸餘小洲一切諸山并須彌山王悉能高舉至一俱盧奢分散破壞略説如前乃至舉高七千由旬分散破壞亦復如是諸比丘但由內鐵圍山大鐵圍山二山障故不來至此諸比丘彼內鐵圍山大鐵圍山二山威德有大利益乃能如是為此四洲四世界中諸衆生等作依止業復次諸比丘當閻浮洲南二鐵圍山外有閻魔王宮殿住處縱廣正等六千由旬七重牆壁七重欄楯七重鈴網其外七重多羅行樹周匝圍繞雜色可觀七寶所成所謂金銀琉璃頗梨赤珠車璩瑪瑙等之所成就於其四方各有諸門一一諸門皆有却敵樓櫓臺殿園苑花池是諸花池及園苑內有種種樹其樹各有種種衆葉種種妙花種種美果彌滿遍布種種諸香隨風遠熏種種衆鳥各各和鳴復次諸比丘彼閻魔王以其惡業不善果故於夜三時及晝三時自然而有赤融銅汁在前出生當於是時其王宮殿即變為鐵於先所有五欲功德在目前者皆沒不現若在宮內即於宮內如是出生時閻魔王見此事已怖畏不安諸毛皆竪即便出外若在宮外即復於外如是出生時閻魔王心生怖畏顫動不安身有諸毛一時皆竪即走入內時守獄者取閻摩王高舉撲之置熱鐵地上其地熾燃極大猛盛光焰炎赫撲令臥已即以鐵鉗開張其口以融銅汁瀉置口中時閻摩王被燒脣口燒脣口已次燒其舌既燒舌已復燒咽喉燒咽喉已復燒大腸及小腸等次第燋燃從下而出當於爾時彼閻摩王作如是念一切衆生以於往昔身作惡行口作惡行意作惡行是故彼等皆受如是種種異色無量苦惱心不喜事如地獄中諸衆生等今我此身并餘衆生與閻摩王同作業者亦復如是嗚呼願我從今捨此身已更得身時俱於人間相逢受生令我爾時於如來法中當得信解得信解已我於彼處復當更得信解具足剃除鬚髮著袈裟衣得正信解從家出家我於爾時既出家已和合不久便於善男子為何事故得正信解從家出家無上梵行所盡之處現見法中自得通證具足證已願我當言我今生死已盡梵行已立所應作者皆已作訖更不復於後世受生諸比丘彼閻摩王復於是時發如是等熏習善念即於爾時彼閻摩王所住宮殿還成七寶種種出生猶如諸天五欲功德現前具足爾時閻摩王復作是念一切衆生以身善行口意善行便得快樂唯願彼等各各皆受如是安樂譬如空居諸夜叉輩所謂我身及餘閻摩王諸有衆生同集業者諸比丘有三天使在於世間何等為三所謂老病死也諸比丘有一種人以自放逸身行惡行口行惡行意行惡行如是等人身口及意皆行於惡以此因緣身壞命終趣於惡道生地獄中諸守獄者應時即來驅彼衆生至閻摩王前白言天王此等衆生昔在人間縱逸自在不善和合恣身口意行於惡行以其身口及意行惡行故今來生此唯願天王善教示之善呵責之時閻摩王問罪人言汝善丈夫昔在人間第一天使善教示汝善呵責汝豈得不見彼初天使出現生耶答言大天我實不見時閻摩王重復告言丈夫汝豈不見昔在世間為人身時或作婦女或作丈夫衰老相現摩訶羅時齒落髮白皮膚緩皺黑黶遍體狀若胡麻膊傴背曲行步跛蹇足不依身左右傾側頸細皮寬兩邊垂緩猶若牛胡脣口乾枯喉舌燥澀身體屈弱氣力綿微喘息出聲猶如挽鋸向前欲倒恃杖而行盛年衰損血肉消竭羸瘦尫弱趣來世路舉動沈滯無復壯形乃至身心恆常顫掉一切支節疲懈難攝汝見之不彼人答言大天我實見之時閻摩王復告之言汝愚癡人無有智慧昔日既見如是相貌云何不作如是思惟我今此身亦有是法亦有是事我亦未離如是等法我今具有如是老法未得遠離我當於身口意亦可造作微妙善業使我當有長夜利益安樂之報爾時彼人復答言大天我實不作如是思惟何以故以心縱蕩行放逸故時閻摩王又更告言汝愚癡人若如是者汝自懈怠行放逸故不修身口及意善業以是因緣汝當長夜得大苦惱無有安樂是故汝當具足受此放逸之罪得如是等惡業果報亦如諸餘放逸衆生受此罪報又汝諸人此之苦報惡業果者非汝母作非汝父作非汝兄弟作非姊妹作非國王作非諸天作亦非往昔先人所作是汝自身作此惡業今還聚集受此報也爾時閻摩王具以如是第一天使善加教示呵責彼已復以第二天使善教示之善呵責之告言諸人汝豈不見第二天使世間出耶答言大天我實不見王復告言汝豈不見昔在世間作人身時若婦女身若丈夫身四大和合忽爾乖違病苦所侵纏綿困篤或臥小床或臥大床以自糞屎汙穢於身宛轉其中不得自在眠臥起坐仰人扶侍洗拭抱持與飲與食一切須人汝見之不彼人答言大天我實見之王復告言癡人汝見如是若巧智者云何不作如是思惟我今亦有如是之法我今亦有如是之事我亦未離如是之患法我亦自有如是患事既未免脫應自覺知我今亦可作諸善業若身若口若意善業令我當來長夜得於大利益事大安樂事彼人答言不也大天我實不作如是思惟以懈怠心行放逸故王復告言癡人汝今既是行放逸者懶惰懈怠不作善業若身若口若意善業汝何能得長夜利益及安樂報是故汝當修行善事若行放逸隨放逸故汝此惡業非父母作非兄弟作非姊妹作非王非天亦非往昔先人所作非諸沙門及婆羅門等之所造作此之惡業汝既自作汝還自受此果報也時閻摩王次以如是第二天使善加教示呵責彼已更以第三天使善教示之善呵責之語言汝愚癡人汝昔人間作人身時豈可不見第三天使世間出耶答言大天我實不見時閻摩王復告之言汝愚癡人在世間時豈復不見若婦女身若丈夫身隨時命終置於床上以雜色衣而蒙覆之將出聚落又作種種斗帳軒蓋周匝莊嚴眷屬圍繞絶棄瓔珞舉手散髮灰土坌頭極大悲惱號咷哭泣或言嗚呼或言多多或言養育舉聲大叫捶胸哀慟種種語言酸哽楚切汝悉見不答言大天我實見之時閻摩王復告之言癡人汝昔既見如此等事何不自作如是思惟我今亦有如是之法我身亦有如是之事我既未脫如是事者我亦有死亦有死法未得免離我今宜可作諸善業若身若口若意善業為我長夜得大利益得安樂故爾時彼人答言大天我實不作如是思惟何以故以放逸故時閻摩王復告之言癡人汝今既是放逸行者以放逸故不作善業亦不為汝長夜利益長夜安樂故聚集其餘身口意善是故汝今有如是事謂放逸行以放逸故汝自造此惡不善業汝此惡業非父母作非兄弟作非姊妹作非王非天亦非往昔先人所作又非沙門婆羅門作汝此惡業是汝自作自聚集故得此果報汝還自受時閻摩王具足以此第三天使教示呵責彼諸罪人呵責訖已勑令將去時守獄者即執罪人兩足兩臂以頭向下以足向上遙擲置於諸地獄中爾時世尊説此偈言衆生造作惡業已死後墮於惡趣中時閻摩王見彼來以悲愍心而呵責汝昔在於人間時可不見於老病死此是天使來告示云何放逸不覺知縱身口意染諸塵不行施戒自調伏如此云何名有識而不造作利益因爾時如法閻摩王作是呵責罪人已彼人喘息心驚怖舉身顫掉白王言我昔由隨惡朋友聞諸善法心不喜貪欲瞋恚所纏覆不作自利故損身王言汝不修善因唯造種種諸惡業癡人今日當得果受彼業故來地獄如此一切諸惡業非父非母之所作亦非沙門婆羅門又非國王諸天造此但是汝自所作諸惡業種不淨故自既作此諸惡業今當分受此惡果彼王以是三天使次第教示呵責已於是獄主閻摩王棄捨罪人令將去閻摩世中居住者即前執取諸罪人牽將趣於地獄所極大可畏毛竪處四邊相向有四門四方四維皆齊整周回院牆悉是鐵四面復以鐵為欄熾燃熱鐵以為地光焰猛盛煙火合遙見可畏心破裂嚴熾炎赫不可向猶如一百由旬內大火熾燃悉彌滿其中所燒衆生類皆由往昔作惡因被三天使之所訶而心放逸無覺察彼等於今長夜悔皆由往昔下劣心諸有智慧衆生等若見天使來開導應當精勤莫放逸此聖法王善巧説既見聞已當驚恐諸有生死窮盡處一切無過於涅槃種種患盡無有餘至彼安隱則快樂如是見法得寂滅所謂已度諸恐怖自然清淨得涅槃
