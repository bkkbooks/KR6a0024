  - {type: variant, offset: 8523, length: 61, content: 此經，宋藏題為起世因本經，闍那崛多譯，却之為後經，編入取凾，丹藏題為起世經，進之為前經。今檢《開元錄》，丹藏為正，故今題中除因本二字，進之為澄函焉, 宋: '', 元: '', 明: ''}
